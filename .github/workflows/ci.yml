name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.6.0

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  typecheck:
    name: Mypy type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            mypy>=1.11.0 \
            pydantic>=2.8.0 \
            pydantic-settings>=2.4.0 \
            fastapi>=0.115.0

      - name: Run mypy
        run: mypy api/ --config-file=pyproject.toml

  test:
    name: Pytest unit suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            fastapi>=0.115.0 \
            uvicorn>=0.30.0 \
            pydantic>=2.8.0 \
            pydantic-settings>=2.4.0 \
            python-dotenv>=1.0.0 \
            httpx>=0.27.0 \
            pytest>=8.3.0 \
            pytest-asyncio>=0.24.0 \
            pytest-cov>=5.0.0

      - name: Run smoke tests
        env:
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          APP_SECRET_KEY: ci_secret_key_not_real_32chars!!
          NEO4J_PASSWORD: ci_neo4j_pass
          REDIS_PASSWORD: ci_redis_pass
        run: pytest tests/smoke/ -v --tb=short --no-header

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  docker-validate:
    name: Validate docker-compose syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
