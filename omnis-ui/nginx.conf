server {
  listen 80;
  server_name _;

  # Allow large document uploads (PDFs, manuals, etc.)
  client_max_body_size 200M;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Content-Type-Options  "nosniff"                          always;
  add_header X-Frame-Options         "DENY"                             always;
  add_header X-XSS-Protection        "1; mode=block"                   always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  # connect-src covers same-origin API calls proxied below (/v1/*)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;

  # ── Gzip ─────────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── WebSocket proxy for ingestion progress ───────────────────────────────
  # Must come before the generic /v1/ block (more specific match wins).
  location ~ ^/v1/ingest/[^/]+/progress$ {
    proxy_pass         http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 3600s;
    proxy_buffering    off;
  }

  # ── Proxy API calls to FastAPI ────────────────────────────────────────────
  # Browser calls /v1/* → nginx forwards to api:8000 → no CORS needed.
  # SSE streams need buffering disabled so tokens arrive immediately.
  location /v1/ {
    proxy_pass         http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Connection        "";

    # Disable buffering for SSE streaming endpoints
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 300s;
  }

  # ── Health + legacy API ───────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Connection        "";
  }

  # ── Immutable cache for hashed static assets ──────────────────────────────
  location ~* \.(js|css|woff2?|png|svg|ico)$ {
    root    /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control          "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  # ── SPA fallback ─────────────────────────────────────────────────────────
  root  /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
