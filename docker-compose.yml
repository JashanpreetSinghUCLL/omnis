x-app-env: &app-env
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_SECRET_KEY: ${APP_SECRET_KEY:-change_me_in_production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
  LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
  QDRANT_URL: http://qdrant:6333
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-omnis_dev_password}
  REDIS_URL: redis://:${REDIS_PASSWORD:-omnis_dev_redis}@redis:6379/0
  REDIS_PASSWORD: ${REDIS_PASSWORD:-omnis_dev_redis}
  TASKIQ_BROKER_URL: redis://:${REDIS_PASSWORD:-omnis_dev_redis}@redis:6379/1

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: omnis-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port 8000 exposed for local dev (pnpm dev hits localhost:8000 directly).
    # nginx proxies /v1/* internally in Docker so both paths work.
    ports:
      - "8000:8000"
    volumes:
      - ingest_tmp:/ingest_tmp
      - hf_cache:/tmp/fastembed_cache
    environment:
      <<: *app-env
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-lf-pk-omnis-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-lf-sk-omnis-dev}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/api/health'')"',
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # Async worker — connects directly to Redis/Qdrant/Neo4j, does NOT need the API
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: omnis-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ingest_tmp:/ingest_tmp
      - hf_cache:/tmp/fastembed_cache
    environment:
      <<: *app-env
      HF_TOKEN: ${HF_TOKEN:-}

  # Frontend (Vite build served by Nginx)
  ui:
    build:
      context: ./omnis-ui
      dockerfile: Dockerfile
      args:
        # Empty string → same-origin → nginx proxies /v1/* and /api/* to api:8000 internally.
        # Override with VITE_API_BASE_URL=http://myhost:8000 only when nginx is not in the path.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: omnis-ui
    restart: unless-stopped
    # UI is pre-built static HTML/JS — nginx can start independently.
    # The browser calls the API at runtime; no startup dependency needed.
    ports:
      - "5173:80"

  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: omnis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP / REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333; echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"200 OK\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Graph Database
  neo4j:
    image: neo4j:5.26-community
    container_name: omnis-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/omnis_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  # Cache / Task Broker
  redis:
    image: redis:7-alpine
    container_name: omnis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-omnis_dev_redis}
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-omnis_dev_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Langfuse — Observability (Postgres + ClickHouse)
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: omnis-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfuse_dev_pass}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: omnis-langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "langfuse",
          "--password",
          "${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  langfuse:
    image: langfuse/langfuse:3
    container_name: omnis-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-langfuse_dev_pass}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-super_secret_langfuse_dev}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT:-langfuse_salt_dev}
      LANGFUSE_INIT_ORG_ID: omnis
      LANGFUSE_INIT_ORG_NAME: Omnis
      LANGFUSE_INIT_PROJECT_ID: omnis-dev
      LANGFUSE_INIT_PROJECT_NAME: omnis-dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-lf-pk-omnis-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-lf-sk-omnis-dev}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL:-admin@omnis.local}
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-admin_dev_pass}
      # Langfuse 3.x validates S3 bucket env vars at startup even when disabled.
      # Provide dummy values so Zod passes; uploads are disabled so they are never used.
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "local-dev-unused"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "local-dev-unused"
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- http://127.0.0.1:3000/api/public/health | grep -q ''"status":"ok"'' || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

volumes:
  ingest_tmp:
  hf_cache:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  redis_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:

networks:
  default:
    name: omnis-network
