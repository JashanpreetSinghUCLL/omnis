services:
  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: omnis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP / REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Graph Database
  neo4j:
    image: neo4j:5.26-community
    container_name: omnis-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/omnis_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  # Cache / Task Broker
  redis:
    image: redis:7-alpine
    container_name: omnis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-omnis_dev_redis}
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-omnis_dev_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Langfuse — Observability (Postgres + ClickHouse)
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: omnis-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfuse_dev_pass}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: omnis-langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "langfuse",
          "--password",
          "${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  langfuse:
    image: langfuse/langfuse:3
    container_name: omnis-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-langfuse_dev_pass}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse_dev_pass}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-super_secret_langfuse_dev}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT:-langfuse_salt_dev}
      LANGFUSE_INIT_ORG_ID: omnis
      LANGFUSE_INIT_ORG_NAME: Omnis
      LANGFUSE_INIT_PROJECT_ID: omnis-dev
      LANGFUSE_INIT_PROJECT_NAME: omnis-dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-lf-pk-omnis-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-lf-sk-omnis-dev}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL:-admin@omnis.local}
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-admin_dev_pass}
      # Langfuse 3.x validates S3 bucket env vars at startup even when disabled.
      # Provide dummy values so Zod passes; uploads are disabled so they are never used.
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "local-dev-unused"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "local-dev-unused"
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: "us-east-1"
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/127.0.0.1/3000 && echo OK' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  redis_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:

networks:
  default:
    name: omnis-network
